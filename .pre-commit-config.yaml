minimum_pre_commit_version: 4.0.0
exclude: ^LICENSES/|\.(html|csv|svg)$

default_stages: [pre-commit]
ci:
  autofix_prs: false
  autoupdate_schedule: monthly

repos:
 # pre-commit 基础检查
  - repo: https://gitcode.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
        exclude: \.md$
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-json
        exclude: ^\.devcontainer/devcontainer\.json$
  # C++ 代码格式化检查
  - repo: https://gitcode.com/pre-commit-clang/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [file]
        files: |
          (?x)^(
            examples/|
            tests/ut/
          ).*\.(c|h|cpp|hpp|cc|hh|cxx|hxx|asc)$
        exclude: ^(third_party/|cmake/third_party/|tests/third_party/)
        args:
          - "--style=file"
          - "--verbose"
          - "-i"

  # OAT 合规性检查 (Open Source Audit Tool)
  - repo: local
    hooks:
      - id: oat-check
        name: OAT Compliance Check
        entry: bash scripts/oat_check.sh
        language: system
        pass_filenames: true
        require_serial: true
        types: [file]
        exclude: ^LICENSE$
        stages: [pre-commit]
        verbose: true
